<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 7</title>
</head>
<body>
    <script>
        // 1. Médias individuais
let media1 = (8 + 9 + 7) / 3;
let media2 = (4 + 5 + 6) / 3;

// 2. Soma das duas médias
let somaMedias = media1 + media2;

// 3. Média das médias
let mediaDasMedias = (media1 + media2) / 2;

// Exibição dos resultados no navegador
document.write("<h2>Cálculos de Médias Aritméticas</h2>");

document.write("<p>A média dos números 8, 9 e 7 é: <b>" + media1.toFixed(2) + "</b></p>");
document.write("<p>A média dos números 4, 5 e 6 é: <b>" + media2.toFixed(2) + "</b></p>");

document.write("<hr>");

document.write("<p>A soma das duas médias é: <b>" + somaMedias.toFixed(2) + "</b></p>");
document.write("<p>A média das médias é: <b>" + mediaDasMedias.toFixed(2) + "</b></p>");
    </script>
</body>
</html>
