<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 18</title>
</head>
<body>
    <script>
        // 1. Inicializamos as variáveis de controle
let nomeMaisNovo = "";
let idadeMaisNova = 999; // Começamos com um valor alto para que qualquer idade digitada seja menor que este início
const totalPessoas = 10;

// 2. Criamos o laço para ler os dados de 10 pessoas
for (let i = 1; i <= totalPessoas; i++) {
    let nome = prompt("Digite o nome da " + i + "ª pessoa:");
    let idade = parseInt(prompt("Digite a idade de " + nome + ":"));

    // Validação básica para garantir que a idade é um número
    if (!isNaN(idade) && idade >= 0) {
        
        // Lógica de comparação: se a idade atual for menor que a menor registrada...
        if (idade < idadeMaisNova) {
            idadeMaisNova = idade; // Atualiza a menor idade
            nomeMaisNovo = nome;   // Guarda o nome desta pessoa
        }
        
    } else {
        alert("Idade inválida. Por favor, tente novamente para esta pessoa.");
        i--; // Repete a iteração para a mesma pessoa
    }
}

// 3. Exibição do resultado final na tela
document.write("<h2>Resultado da Pesquisa</h2>");
document.write("<p>Total de pessoas analisadas: <b>" + totalPessoas + "</b></p>");
document.write("<hr>");

document.write("<p style='font-size: 1.2em;'>A pessoa mais nova do grupo é: <span style='color: darkgreen;'><b>" + nomeMaisNovo + "</b></span></p>");
document.write("<p>Idade: <b>" + idadeMaisNova + " anos</b></p>");
    </script>
</body>
</html>
