<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 9</title>
</head>
<body>
    <script>
        // Definição do valor do salário mínimo (Referência: R$ 1.212,00)
const SALARIO_MINIMO = 1212.00;

// Leitura do salário do usuário
let salarioUsuario = parseFloat(prompt("Digite o valor do seu salário (R$):"));

// Cálculo da quantidade de salários mínimos
let quantidadeSalarios = salarioUsuario / SALARIO_MINIMO;

// Exibição do resultado na tela
document.write("<h2>Cálculo de Salários Mínimos</h2>");
document.write("<p>Valor do Salário Mínimo de referência: <b>R$ " + SALARIO_MINIMO.toFixed(2).replace('.', ',') + "</b></p>");
document.write("<p>Seu salário informado: <b>R$ " + salarioUsuario.toFixed(2).replace('.', ',') + "</b></p>");

document.write("<hr>");

document.write("<p>Você ganha aproximadamente <b>" + quantidadeSalarios.toFixed(2) + "</b> salários mínimos.</p>");
    </script>
</body>
</html>
