<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 11</title>
</head>
<body>
    <script>
        // 1. Leitura dos dados do vendedor
let nomeVendedor = prompt("Digite o nome do vendedor:");
let salarioFixo = parseFloat(prompt("Digite o salário fixo (R$):"));
let totalVendasMes = parseFloat(prompt("Digite o total de vendas no mês (R$):"));

// 2. Cálculo da comissão (15% = 0.15)
let comissao = totalVendasMes * 0.15;

// 3. Cálculo do salário final
let salarioFinal = salarioFixo + comissao;

// 4. Exibição dos resultados na tela
document.write("<h2>Relatório de Rendimentos Mensais</h2>");
document.write("<hr>");

document.write("<p>Vendedor: <b>" + nomeVendedor + "</b></p>");
document.write("<p>Salário Fixo: <b>R$ " + salarioFixo.toFixed(2).replace('.', ',') + "</b></p>");

document.write("<hr>");

document.write("<p>Total de Vendas no Mês: <b>R$ " + totalVendasMes.toFixed(2).replace('.', ',') + "</b></p>");
document.write("<p>Comissão (15%): <span style='color: blue;'><b>R$ " + comissao.toFixed(2).replace('.', ',') + "</b></span></p>");

document.write("<hr>");

document.write("<p><b>Salário Total a Receber:</b> <span style='color: green;'><b>R$ " + salarioFinal.toFixed(2).replace('.', ',') + "</b></span></p>");
    </script>
</body>
</html>
