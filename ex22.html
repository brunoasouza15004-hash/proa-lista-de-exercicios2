<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 22</title>
</head>
<body>
    <script>
        // 1. Inicializamos o contador para o intervalo [0, 100]
let contagemNoIntervalo = 0;
const totalNumeros = 20;

// 2. Criamos o laço para ler os 20 números
for (let i = 1; i <= totalNumeros; i++) {
    let numero = parseFloat(prompt("Digite o " + i + "º número:"));
    
    // Verificamos se a entrada é um número válido
    if (!isNaN(numero)) {
        // Lógica: O número deve ser >= 0 E <= 100 ao mesmo tempo
        if (numero >= 0 && numero <= 100) {
            contagemNoIntervalo++;
        }
    } else {
        alert("Por favor, digite um número válido.");
        i--; // Repete a entrada para a mesma posição caso o valor seja inválido
    }
}

// 3. Exibição do resultado final na tela
document.write("<h2>Análise de Intervalo (0 a 100)</h2>");
document.write("<p>Total de números processados: <b>" + totalNumeros + "</b></p>");

document.write("<hr>");

document.write("<p style='font-size: 1.2em;'>Números que estão <b>entre 0 e 100</b>: <span style='color: darkgreen;'><b>" + contagemNoIntervalo + "</b></span></p>");
document.write("<p style='font-size: 1.1em;'>Números <b>fora</b> desse intervalo: <b>" + (totalNumeros - contagemNoIntervalo) + "</b></p>");
    </script>
</body>
</html>
