<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 8</title>
</head>
<body>
    <script>
        // Captura dos valores
let a = parseFloat(prompt("Digite o valor de A:"));
let b = parseFloat(prompt("Digite o valor de B:"));
let c = parseFloat(prompt("Digite o valor de C:"));

let aux;

// Lógica de ordenação (Troca de valores)
if (a < b) {
    aux = a;
    a = b;
    b = aux;
}

if (a < c) {
    aux = a;
    a = c;
    c = aux;
}

if (b < c) {
    aux = b;
    b = c;
    c = aux;
}

// Exibição dos dados na página
document.write("<h2>Valores em Ordem Decrescente</h2>");
document.write("<p>1º Maior: <b>" + a + "</b></p>");
document.write("<p>2º Maior: <b>" + b + "</b></p>");
document.write("<p>3º Maior: <b>" + c + "</b></p>");
    </script>
</body>
</html>
