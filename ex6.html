<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 6</title>
</head>
<body>
    <script>
        // Solicita o número inteiro ao usuário
let numero = parseInt(prompt("Digite um número inteiro:"));

// Realiza os cálculos
let antecessor = numero - 1;
let sucessor = numero + 1;

// Exibe os resultados na tela
document.write("<h2>Análise de Número</h2>");
document.write("<p>O número digitado foi: <b>" + numero + "</b></p>");
document.write("<hr>"); // Linha horizontal para organizar
document.write("<p>Seu antecessor é: <b>" + antecessor + "</b></p>");
document.write("<p>Seu sucessor é: <b>" + sucessor + "</b></p>");
    </script>
</body>
</html>
