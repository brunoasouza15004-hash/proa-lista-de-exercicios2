<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 12</title>
</head>
<body>
    <script>
 // 1. Inicializa a variável que guardará o total acumulado
let soma = 0;

// 2. Estrutura de repetição de 1 até 15
// i++ significa que a cada volta, o valor de i aumenta em 1
for (let i = 1; i <= 15; i++) {
    soma = soma + i;
}

// 3. Exibição do resultado na tela
document.write("<h2>Cálculo de Soma Sequencial</h2>");
document.write("<p>Calculando a soma de todos os números inteiros de <b>1 a 15</b>...</p>");

document.write("<hr>");

document.write("<p>O resultado total da soma é: <span style='font-size: 20px; color: blue;'><b>" + soma + "</b></span></p>");
</script>
</body>
</html>
